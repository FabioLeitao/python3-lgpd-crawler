# Optional: PodDisruptionBudget for lgpd-audit.
# Apply only when running more than one replica (e.g. replicas: 2).
# Ensures at least one pod remains available during voluntary disruptions (node drain, etc.).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lgpd-audit-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lgpd-audit
