# Dependabot: automated dependency and workflow updates for security and maintenance.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This project uses pyproject.toml (PEP 621) at repo root. Dependabot with package-ecosystem "pip"
# and directory "/" will propose updates to dependencies in [project.dependencies].
# Optional [dependency-groups] (PEP 735) may not be fully grouped; main deps are still updated.
version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps(pip)"
    groups:
      # Batch minor/patch updates into one PR to reduce noise; security updates still created separately
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions (workflows and action versions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci(actions)"
